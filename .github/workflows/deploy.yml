name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "|1|dVC4Z6X2GA5MZOFxPg0S9JVb9oI=|dbQYmEcEu9C7cogh2TBpH9gFQ3o= ssh-rsa " >> ~/.ssh/known_hosts
          echo "|1|1zTHlkU6Pr/50BJbGPvQ6e359I4=|lHpoQtW9QfbK1geDeEGbc8cB38k= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBH3xo165pCrtjvE3rMxXvt8wEfnRvmWDDlaOOipTDBrvGRRXe5y+DbJiUCIlozd/DjxVXjtCu+QPh1pBg4sXrA0=" >> ~/.ssh/known_hosts
          echo "|1|tJp8V8VP1cKq9+vR0zKm+5o6Kms=|yW9TayBTJNf3+j7ybM1b6O00Fos= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDazfFEFAMnCQX+5qLeroKI7d2DJLjiiPYPty4hyMDeJ" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key ploi@107.173.35.23 \
            "cd /home/ploi/foodrecord.webprvw.xyz && git pull origin main"
